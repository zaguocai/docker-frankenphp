; 基本启用设置
opcache.enable=1
opcache.enable_cli=1          ; CLI 也启用，适用于队列、定时任务等

; 内存关键设置（根据项目规模调整）
opcache.memory_consumption=256      ; 共享内存大小(MB)，建议 256-512
opcache.interned_strings_buffer=32  ; 字符串驻留内存(MB)，PHP 8+ 建议 16-32
opcache.max_accelerated_files=50000 ; 最大缓存文件数，必须 > 项目文件总数

; 缓存验证策略（生产环境核心优化）
opcache.validate_timestamps=0       ; ❗ 生产环境必须为 0（禁用时间戳检查）
opcache.revalidate_freq=0           ; 与 validate_timestamps=0 配合
opcache.revalidate_path=0           ; 禁用路径验证

; 性能优化参数
opcache.fast_shutdown=1             ; 快速关闭机制
opcache.enable_file_override=1      ; 允许覆盖文件函数
opcache.optimization_level=0x7FFFEFFF ; 最大优化级别（PHP 7+）
opcache.max_file_size=0             ; 无文件大小限制
opcache.save_comments=1             ; 保留注释（某些框架依赖）
opcache.load_comments = 1

; 高级设置（可选优化）
opcache.consistency_checks=0        ; 禁用一致性检查（性能开销大）
opcache.log_verbosity_level=0       ; 禁用日志减少开销
opcache.huge_code_pages=1           ; 启用大内存页（如果系统支持）

; 在只读根文件系统或需要持久化缓存时启用（可选，用于持久化缓存）
; opcache.file_cache=/tmp/opcache      ; 使用内存文件系统（/dev/shm）
; opcache.file_cache_only=0            ; 混合模式（内存优先）
; opcache.file_cache_consistency_checks=1 ; 文件缓存一致性检查
